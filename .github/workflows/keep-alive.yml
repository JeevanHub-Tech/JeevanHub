name: Keep backend warm

# Render's free tier spins the service down after ~15 minutes with no
# requests; the next request then pays a cold-start (~30-50s). Pinging the
# health route every 10 minutes keeps it warm. GitHub's cron scheduler isn't
# guaranteed to fire at the exact minute (it can slip, especially on quiet
# repos) -- if that slack ever matters, move to Render's paid tier (no
# spin-down) or an external monitor (UptimeRobot, cron-job.org) instead.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health route
        run: |
          if [ -z "${{ vars.RENDER_BACKEND_URL }}" ]; then
            echo "RENDER_BACKEND_URL repo variable is not set -- skipping. Add it under Settings > Secrets and variables > Actions > Variables once the Render service is deployed."
            exit 0
          fi
          curl -fsS --max-time 20 "${{ vars.RENDER_BACKEND_URL }}/" || echo "Ping failed (service may be cold-starting) -- not treated as a workflow failure."
